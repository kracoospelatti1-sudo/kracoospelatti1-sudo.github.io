name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 10 */3 * *'  # cada 3 días a las 10am UTC
  workflow_dispatch:         # también se puede correr a mano

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://jxqwrbmnfmnzddkcimrm.supabase.co/rest/v1/events?limit=1" \
            -H "apikey: sb_publishable_YAg0wbF4KmtqEa30MtUVmg_EGhJo61D" \
            -H "Authorization: Bearer sb_publishable_YAg0wbF4KmtqEa30MtUVmg_EGhJo61D")
          echo "Supabase respondió con status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️ Respuesta inesperada: $STATUS"
            exit 1
          fi
          echo "✅ Supabase activo"
