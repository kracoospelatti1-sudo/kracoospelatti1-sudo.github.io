<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EventWall · Pantalla</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#07070f;color:#fff;font-family:'DM Sans',sans-serif}
:root{
  --bg:#07070f; --accent:#f0176f; --txt:#ffffff; --gold:#f5a623;
  --bubble-bg:#ffffff; --bubble-txt:#1a1a1a; --header-bg:#0c0c14;
  --font-title:'Syne',sans-serif; --font-body:'DM Sans',sans-serif;
  --fs-title:22px; --bubble-radius:28px;
}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;background:var(--header-bg);border-bottom:1px solid rgba(255,255,255,0.06);height:68px;position:relative;z-index:10}
.ev-name{font-family:var(--font-title);font-size:var(--fs-title);font-weight:800;color:var(--txt)}
.ev-sub{font-size:12px;color:rgba(255,255,255,0.4);margin-top:2px}
.live-pill{display:flex;align-items:center;gap:6px;background:rgba(240,23,111,0.15);border:1px solid rgba(240,23,111,0.35);padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;color:var(--accent);letter-spacing:1px}
.live-dot{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.counter-pills{display:flex;gap:8px}
.cpill{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);padding:5px 12px;border-radius:20px;font-size:12px;color:rgba(255,255,255,0.7)}
.cpill span{color:var(--accent);font-weight:700}

/* MAIN LAYOUT */
.grid{display:grid;grid-template-columns:1fr 180px;height:calc(100vh - 68px);overflow:hidden}

/* FEATURED */
.featured-side{position:relative;overflow:hidden;background:#000}
.featured-img{width:100%;height:100%;object-fit:contain;display:block;transition:opacity 0.8s ease;position:absolute;inset:0;background:#000}
.featured-overlay{position:absolute;bottom:0;left:0;right:0;padding:24px 28px;background:linear-gradient(transparent,rgba(0,0,0,0.85));z-index:2;display:none}
.featured-caption{font-family:var(--font-title);font-size:20px;font-weight:700;line-height:1.4;margin-bottom:6px;color:var(--txt)}
.featured-author{font-size:13px;color:var(--accent);font-weight:600}
.no-content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:rgba(255,255,255,0.2);z-index:1}
.no-content .big{font-size:64px}

/* REACTION OVERLAY */
.reaction-overlay{position:absolute;inset:0;pointer-events:none;z-index:5;overflow:hidden}
.floating-emoji{position:absolute;font-size:40px;animation:floatUp 2.5s ease-out forwards;pointer-events:none}
@keyframes floatUp{0%{transform:translateY(0) scale(0.5);opacity:1}100%{transform:translateY(-90%) scale(0.8);opacity:0}}
.reaction-bar{position:absolute;bottom:0;left:0;right:0;z-index:10;display:flex;justify-content:center;padding:10px;gap:8px;background:linear-gradient(transparent,rgba(0,0,0,0.75))}
.react-btn{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:7px 14px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:5px;color:#fff;font-family:'DM Sans',sans-serif;font-size:13px}
.react-btn:hover{background:rgba(255,255,255,0.25);transform:scale(1.1)}
.react-btn .cnt{font-size:11px;font-weight:700;color:rgba(255,255,255,0.8)}
.reaction-toast{position:absolute;top:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);border:1px solid rgba(255,255,255,0.15);border-radius:20px;padding:8px 18px;font-size:14px;color:#fff;white-space:nowrap;display:none;z-index:15}
.new-badge{position:absolute;top:16px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;font-weight:700;display:none;z-index:20;pointer-events:none;animation:badgePop 0.4s cubic-bezier(0.175,0.885,0.32,1.275)}
@keyframes badgePop{from{transform:translateX(-50%) scale(0.7);opacity:0}to{transform:translateX(-50%) scale(1);opacity:1}}

/* SIDEBAR */
.sidebar{border-left:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;background:rgba(0,0,0,0.3);overflow:hidden;min-height:0}
.qr-section{padding:16px;margin-top:auto}
.qr-inner{display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center}
.qr-box{background:#fff;padding:10px;border-radius:10px}
.qr-text{font-size:11px;color:rgba(255,255,255,0.45);line-height:1.6}
.qr-text strong{color:rgba(255,255,255,0.8);display:block;font-size:12px;margin-bottom:2px}

/* MESSAGE BUBBLE OVERLAY */
@keyframes bubbleIn{from{transform:scale(0.7) translateY(30px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
@keyframes bubbleOut{from{transform:scale(1);opacity:1}to{transform:scale(0.8) translateY(-20px);opacity:0}}

/* WISH OVERLAY */
@keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes heartBeat{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@keyframes particleFly{0%{transform:translateY(100vh) rotate(0deg);opacity:1}100%{transform:translateY(-20vh) rotate(720deg);opacity:0}}
@keyframes wishTextIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

/* POLL SCREEN */
.sbar-wrap{background:rgba(255,255,255,0.06);border-radius:12px;padding:16px 20px;margin-bottom:12px}
.sbar-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sbar-label{font-size:16px;font-weight:600;color:#fff}
.sbar-count{font-size:14px;font-weight:700;color:var(--accent)}
.sbar-bg{background:rgba(255,255,255,0.08);border-radius:8px;height:14px;overflow:hidden}
.sbar-fill{height:100%;border-radius:8px;background:var(--accent);transition:width 0.8s cubic-bezier(0.34,1.56,0.64,1)}
.sbar-fill.winner{background:var(--gold)}

/* LOADING */
.screen-loading{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;color:rgba(255,255,255,0.4)}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,0.1);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* MESSAGE STRIP */
.msg-strip{display:flex;flex-direction:column;gap:8px;padding:10px 8px;overflow:hidden;flex:1;min-height:0}
.msg-card{background:var(--bubble-bg);border-radius:12px;padding:10px 12px;opacity:0;transform:translateY(-8px);transition:all 0.4s ease;animation:msgSlideIn 0.4s ease forwards}
@keyframes msgSlideIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
.msg-card-icon{font-size:14px;margin-bottom:4px}
.msg-card-text{font-size:12px;font-weight:700;color:var(--bubble-txt);line-height:1.3;word-break:break-word}
.msg-card-author{font-size:10px;color:var(--bubble-txt);opacity:0.5;margin-top:4px}

/* MOSAIC */
.mosaic-cell{position:absolute;overflow:hidden;border-radius:4px;border:2px solid rgba(0,0,0,0.3);transition:all 0.6s cubic-bezier(0.34,1.56,0.64,1);background:#111}
.mosaic-cell img{width:100%;height:100%;object-fit:cover;display:block}
.mosaic-cell .mcell-author{position:absolute;bottom:0;left:0;right:0;padding:4px 8px;background:linear-gradient(transparent,rgba(0,0,0,0.7));font-size:10px;color:rgba(255,255,255,0.8);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mosaic-cell.new-cell{animation:mosaicPop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards}
@keyframes mosaicPop{from{opacity:0;transform:scale(0.5)}to{opacity:1;transform:scale(1)}}
.mosaic-cell.featured{border-color:var(--accent);box-shadow:0 0 20px rgba(240,23,111,0.4)}

/* LIGHT THEME */
body.theme-light .sidebar{background:rgba(0,0,0,0.06);border-left-color:rgba(0,0,0,0.1)}
body.theme-light .cpill{background:rgba(0,0,0,0.06);border-color:rgba(0,0,0,0.1);color:rgba(0,0,0,0.7)}
body.theme-light .qr-text{color:rgba(0,0,0,0.4)}
body.theme-light .qr-text strong{color:rgba(0,0,0,0.7)}
</style>
</head>
<body>

<!-- MOMENT OVERLAY -->
<div id="moment-overlay" style="position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center;flex-direction:column;gap:20px;pointer-events:none">
  <div id="moment-blur-bg" style="position:absolute;inset:0;backdrop-filter:blur(12px) brightness(0.6);-webkit-backdrop-filter:blur(12px) brightness(0.6);background:rgba(0,0,0,0.3);opacity:0;transition:opacity 0.5s ease"></div>
  <canvas id="moment-canvas" style="position:absolute;inset:0;width:100%;height:100%"></canvas>
  <div id="moment-flash" style="position:absolute;inset:0;background:#fff;opacity:0;transition:opacity 0.1s;pointer-events:none"></div>
  <div id="moment-text-wrap" style="position:relative;z-index:2;text-align:center;padding:0 40px">
    <div id="moment-main-text" style="font-family:'Syne',sans-serif;font-size:clamp(48px,8vw,96px);font-weight:800;color:#fff;text-shadow:0 4px 32px rgba(0,0,0,0.5);line-height:1.1;opacity:0;transform:scale(0.5);transition:all 0.6s cubic-bezier(0.175,0.885,0.32,1.275)"></div>
    <div id="moment-sub-text" style="font-family:'DM Sans',sans-serif;font-size:clamp(20px,3vw,36px);font-weight:500;color:rgba(255,255,255,0.85);margin-top:12px;opacity:0;transform:translateY(20px);transition:all 0.5s ease 0.3s"></div>
  </div>
</div>

<!-- BACKGROUND CANVAS -->
<canvas id="bg-canvas" style="position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0.7"></canvas>

<div id="loading" class="screen-loading">
  <div class="spinner"></div>
  <p>Cargando evento...</p>
</div>

<!-- POLL OVERLAY -->
<div id="poll-overlay" style="position:fixed;inset:0;z-index:90;display:none;align-items:center;justify-content:center;flex-direction:column;background:rgba(7,7,15,0.96);padding:40px">
  <div style="width:100%;max-width:700px">
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-size:13px;font-weight:700;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px">🗳 VOTACIÓN EN VIVO</div>
      <div id="poll-screen-question" style="font-family:var(--font-title);font-size:clamp(20px,3.5vw,36px);font-weight:800;color:#fff;line-height:1.3"></div>
    </div>
    <div id="poll-screen-bars"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:20px;gap:20px">
      <div id="poll-screen-total" style="font-size:14px;color:rgba(255,255,255,0.4)"></div>
      <div id="poll-screen-timer" style="display:none;font-size:56px;font-weight:800;font-family:var(--font-title);min-width:90px;text-align:right;color:var(--accent)"></div>
    </div>
  </div>
</div>

<!-- MESSAGE BUBBLE OVERLAY -->
<div id="msg-bubble-overlay" style="position:fixed;inset:0;z-index:85;display:none;align-items:center;justify-content:center;pointer-events:none">
  <div id="msg-bubble-card" style="background:var(--bubble-bg);border-radius:var(--bubble-radius);padding:36px 44px;max-width:min(680px,88vw);width:fit-content;min-width:180px;text-align:center;position:relative;box-shadow:0 32px 80px rgba(0,0,0,0.5);overflow:hidden;word-break:break-word">
    <div id="bubble-tail" style="position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:22px solid transparent;border-right:22px solid transparent;border-top:24px solid var(--bubble-bg)"></div>
    <div id="msg-bubble-icon" style="font-size:36px;margin-bottom:14px">💬</div>
    <div id="msg-bubble-text" style="font-family:var(--font-title);font-size:clamp(18px,3.5vw,38px);font-weight:800;color:var(--bubble-txt);line-height:1.35;margin-bottom:16px"></div>
    <div id="msg-bubble-author" style="font-size:16px;font-weight:600;color:var(--bubble-txt);opacity:0.55"></div>
  </div>
</div>

<!-- WISH OVERLAY -->
<div id="wish-overlay" style="position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;flex-direction:column;overflow:hidden">
  <div id="wish-bg" style="position:absolute;inset:0;background:linear-gradient(135deg,#1a0a14,#2d1020,#1a0a14);background-size:400% 400%;animation:gradShift 8s ease infinite"></div>
  <div id="wish-particles" style="position:absolute;inset:0;pointer-events:none;overflow:hidden"></div>
  <div style="position:relative;z-index:2;text-align:center;padding:40px;max-width:800px">
    <div id="wish-heart" style="font-size:72px;margin-bottom:20px;animation:heartBeat 1.5s ease infinite">💌</div>
    <div id="wish-author" style="font-size:18px;font-weight:600;color:rgba(255,192,210,0.8);margin-bottom:16px;letter-spacing:1px;text-transform:uppercase"></div>
    <div id="wish-text" style="font-family:var(--font-title);font-size:clamp(22px,4vw,48px);font-weight:800;color:#fff;line-height:1.4;text-shadow:0 2px 40px rgba(240,23,111,0.5)"></div>
  </div>
</div>

<div id="app" style="display:none">

<!-- MOSAIC MODE OVERLAY -->
<div id="mosaic-overlay" style="display:none;position:fixed;inset:0;z-index:80;background:#000;flex-direction:column">
  <div id="mosaic-header" style="display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:rgba(0,0,0,0.8);border-bottom:1px solid rgba(255,255,255,0.1);position:absolute;top:0;left:0;right:0;z-index:2">
    <div style="display:flex;align-items:center;gap:12px">
      <span id="mosaic-ev-name" style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#fff"></span>
      <span class="live-pill" style="display:flex;align-items:center;gap:4px"><div class="live-dot"></div>MOSAICO</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <span id="mosaic-count" style="font-size:13px;color:rgba(255,255,255,0.5)">0 fotos</span>
      <select id="mosaic-style-select" onchange="setMosaicStyle(this.value)" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:4px 10px;border-radius:8px;font-size:12px;font-family:inherit">
        <option value="grid">Grilla</option>
        <option value="dynamic">Dinámico</option>
        <option value="masonry">Masonry</option>
      </select>
    </div>
  </div>
  <div id="mosaic-grid" style="position:absolute;inset:0;top:52px;overflow:hidden;padding:4px"></div>
</div>

  <div class="header">
    <div>
      <div class="ev-name" id="ev-name">—</div>
      <div class="ev-sub" id="ev-sub">—</div>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <div class="live-pill"><div class="live-dot"></div>EN VIVO</div>
    </div>
  </div>

  <div class="grid">
    <div class="featured-side" id="featured-side">
      <div class="new-badge" id="new-badge">¡Nuevo contenido! 🎉</div>
      <div class="reaction-toast" id="reaction-toast"></div>
      <div class="no-content" id="no-content">
        <div class="big">📸</div>
        <p style="font-size:16px">Esperando contenido...</p>
        <p style="font-size:13px">Los invitados están escaneando el QR</p>
      </div>
      <img id="featured-img" class="featured-img" src="" alt="" style="display:none"/>
      <div class="featured-overlay" id="featured-overlay">
        <div class="featured-caption" id="featured-caption"></div>
        <div class="featured-author" id="featured-author"></div>
      </div>
      <div class="reaction-overlay" id="reaction-overlay"></div>
    </div>

    <div class="sidebar">
      <div class="msg-strip" id="msg-strip"></div>
      <div class="qr-section">
        <div class="qr-inner">
          <div class="qr-box"><canvas id="qr-canvas" width="120" height="120"></canvas></div>
          <div class="qr-text"><strong>Escaneá para participar</strong>Subí fotos y mensajes<br>en tiempo real</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- hidden for internal tracking -->
<div id="photo-strip" style="display:none"></div>
<div id="reaction-summary" style="display:none"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const SUPABASE_URL='https://jxqwrbmnfmnzddkcimrm.supabase.co';
const SUPABASE_KEY='sb_publishable_YAg0wbF4KmtqEa30MtUVmg_EGhJo61D';

async function api(path){
  try{
    const res=await fetch(SUPABASE_URL+'/rest/v1/'+path,{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});
    const t=await res.text();
    if(!res.ok){console.error('API error',res.status,t);return[];}
    return t?JSON.parse(t):[];
  }catch(e){console.error('API fetch error',e);return[];}
}
async function apiPost(path,body){
  try{
    const res=await fetch(SUPABASE_URL+'/rest/v1/'+path,{method:'POST',headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify(body)});
    const t=await res.text();return t?JSON.parse(t):[];
  }catch(e){return[];}
}

const params=new URLSearchParams(location.search);
const eventId=params.get('event');
const mosaicParam=params.get('mosaic');
let eventName='';
let posts=[],photoPosts=[],featuredIdx=0,lastPostCount=0,rotateTimer=null;
let currentFeaturedPostId=null,reactionCounts={};
let cfg={interval:6000,sound:'chime',fsBubble:32,carouselLimit:5,transition:'fade'};
let sharedAudioCtx=null;
function getAudioCtx(){
  if(!sharedAudioCtx){
    sharedAudioCtx=new(window.AudioContext||window.webkitAudioContext)();
  }
  if(sharedAudioCtx.state==='suspended') sharedAudioCtx.resume();
  return sharedAudioCtx;
}
// Try to unlock AudioContext immediately (works if page was opened via link/redirect)
function tryUnlockAudio(){
  try{
    const ctx=getAudioCtx();
    // Play a silent buffer to unlock
    const buf=ctx.createBuffer(1,1,22050);
    const src=ctx.createBufferSource();
    src.buffer=buf;src.connect(ctx.destination);src.start(0);
    ctx.resume().catch(()=>{});
  }catch(e){}
}
// Try immediately and on any interaction
tryUnlockAudio();
['click','touchstart','touchend','keydown','mousedown','pointerdown'].forEach(evt=>{
  document.addEventListener(evt, tryUnlockAudio, {once:true});
});

// ── FONT LOADER ───────────────────────────────────────────────
function loadScreenFont(font){
  if(!font||font==='Syne'||font==='DM Sans') return;
  const id='gf-'+font.replace(/\s/g,'-');
  if(document.getElementById(id)) return;
  const link=document.createElement('link');
  link.id=id;link.rel='stylesheet';
  link.href='https://fonts.googleapis.com/css2?family='+encodeURIComponent(font)+':wght@400;700;800&display=swap';
  document.head.appendChild(link);
}

// ── THEME ─────────────────────────────────────────────────────
function applyTheme(design){
  if(!design) return;
  const r=document.documentElement;
  const set=(k,v)=>r.style.setProperty(k,v);
  set('--bg',          design.bg||'#07070f');
  set('--accent',      design.accent||'#f0176f');
  set('--txt',         design.text||'#ffffff');
  set('--bubble-bg',   design.bubble||'#ffffff');
  set('--bubble-txt',  design.bubbleText||'#1a1a1a');
  set('--header-bg',   design.header||design.bg||'#0c0c14');
  set('--fs-title',    (design.fsTitle||22)+'px');
  set('--bubble-radius',(design.radius||28)+'px');
  document.body.style.background=design.bg||'#07070f';
  const isLight=(design.bg||'').match(/^#[def]/i);
  document.body.classList.toggle('theme-light',!!isLight);
  if(design.fontTitle){loadScreenFont(design.fontTitle);set('--font-title',"'"+design.fontTitle+"',sans-serif");}
  if(design.fontBody){loadScreenFont(design.fontBody);set('--font-body',"'"+design.fontBody+"',sans-serif");}
  if(design.fsBubble) cfg.fsBubble=parseInt(design.fsBubble);
  if(design.interval) cfg.interval=parseInt(design.interval)*1000;
  if(design.sound) cfg.sound=design.sound;

  // Photo fit
  const img=document.getElementById('featured-img');
  if(img) img.style.objectFit=design.fit||'contain';

  // Header visibility
  const header=document.querySelector('.header');
  if(header) header.style.display=(design.showHeader==='no')?'none':'flex';

  // Counters
  const counters=document.querySelector('.counter-pills');
  if(counters) counters.style.display=(design.showCounters==='no')?'none':'flex';

  // Reactions bar
  const rbar=document.getElementById('reaction-bar');
  if(rbar) rbar.style.display=(design.showReactions==='no')?'none':'flex';

  // QR size
  const qrSize=parseInt(design.qrSize)||120;
  const qrCanvas=document.getElementById('qr-canvas');
  if(qrCanvas){qrCanvas.width=qrSize;qrCanvas.height=qrSize;qrCanvas.style.width=qrSize+'px';qrCanvas.style.height=qrSize+'px';}
  const qrSection=document.querySelector('.qr-section');
  if(qrSection) qrSection.style.display=(qrSize===0)?'none':'block';

  // QR text
  if(design.qrText){const qt=document.querySelector('.qr-text strong');if(qt) qt.textContent=design.qrText;}

  // Sidebar width
  const sidebar=document.querySelector('.sidebar');
  const sidebarW=parseInt(design.sidebarWidth)||180;
  if(sidebar) sidebar.style.display=sidebarW===0?'none':'flex';
  const grid=document.querySelector('.grid');
  if(grid&&sidebarW>0) grid.style.gridTemplateColumns='1fr '+sidebarW+'px';
  else if(grid&&sidebarW===0) grid.style.gridTemplateColumns='1fr';

  // Bubble position
  const bubbleOverlay=document.getElementById('msg-bubble-overlay');
  if(bubbleOverlay){
    const pos=design.bubblePos||'center';
    bubbleOverlay.style.alignItems=pos==='bottom'?'flex-end':pos==='top'?'flex-start':'center';
    bubbleOverlay.style.paddingBottom=pos==='bottom'?'80px':'0';
    bubbleOverlay.style.paddingTop=pos==='top'?'80px':'0';
  }

  // Bubble tail
  const tail=document.getElementById('bubble-tail');
  if(tail) tail.style.display=(design.bubbleTail==='no')?'none':'block';

  // Bubble shadow
  const card=document.getElementById('msg-bubble-card');
  if(card){
    const shadows={heavy:'0 32px 80px rgba(0,0,0,0.5)',soft:'0 8px 32px rgba(0,0,0,0.2)',none:'none'};
    card.style.boxShadow=shadows[design.shadow||'heavy'];
  }

  // Background image
  applyBgImage(design.bgImage, design.bgOpacity);

  // Ticker
  applyTicker(design.ticker, design.tickerColor);

  // Carousel limit
  if(design.carouselLimit) cfg.carouselLimit=parseInt(design.carouselLimit)||5;
  // Transition
  if(design.transition) cfg.transition=design.transition;
  // Background effect
  startBgEffect(design.bgEffect||'none');
}

function applyBgImage(url, opacity){
  let bgEl=document.getElementById('screen-bg-image');
  if(!url){if(bgEl) bgEl.remove();return;}
  if(!bgEl){bgEl=document.createElement('div');bgEl.id='screen-bg-image';bgEl.style.cssText='position:fixed;inset:0;z-index:-1;background-size:cover;background-position:center;pointer-events:none';document.body.appendChild(bgEl);}
  bgEl.style.backgroundImage='url('+url+')';
  bgEl.style.opacity=(parseInt(opacity)||30)/100;
}

function applyTicker(text, color){
  let ticker=document.getElementById('screen-ticker');
  if(!text||!text.trim()){if(ticker) ticker.remove();return;}
  if(!ticker){
    ticker=document.createElement('div');
    ticker.id='screen-ticker';
    ticker.style.cssText='position:fixed;bottom:0;left:0;right:0;z-index:50;height:36px;display:flex;align-items:center;overflow:hidden;';
    const inner=document.createElement('div');
    inner.id='screen-ticker-inner';
    inner.style.cssText='white-space:nowrap;animation:ticker 20s linear infinite;font-size:13px;padding-left:100%;font-weight:600;';
    ticker.appendChild(inner);
    document.body.appendChild(ticker);
  }
  ticker.style.background=(color||'#f0176f')+'22';
  ticker.style.borderTop='1px solid '+(color||'#f0176f')+'44';
  const inner=document.getElementById('screen-ticker-inner');
  if(inner){inner.textContent=text+' · '+text+' · '+text;inner.style.color=color||'#f0176f';}
  // Add ticker keyframe if not exists
  if(!document.getElementById('ticker-style')){
    const s=document.createElement('style');s.id='ticker-style';
    s.textContent='@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-33.33%)}}';
    document.head.appendChild(s);
  }
}

// ── SOUNDS ────────────────────────────────────────────────────
function playSound(type){
  if(type==='none') return;
  try{
    const ctx=getAudioCtx();
    if(ctx.state==='suspended'){ctx.resume().then(()=>playSound(type));return;}
    if(type==='chime'){
      [523,659,784].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;o.type='sine';g.gain.setValueAtTime(0,ctx.currentTime+i*0.15);g.gain.linearRampToValueAtTime(0.3,ctx.currentTime+i*0.15+0.05);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.15+0.5);o.start(ctx.currentTime+i*0.15);o.stop(ctx.currentTime+i*0.15+0.5);});
    } else if(type==='pop'){
      const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.setValueAtTime(800,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(400,ctx.currentTime+0.15);g.gain.setValueAtTime(0.4,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.2);o.start(ctx.currentTime);o.stop(ctx.currentTime+0.2);
    }
  }catch(e){}
}

function addMsgToStrip(msg){
  const strip=document.getElementById('msg-strip');
  if(!strip) return;
  if(msg.type!=='message'&&msg.type!=='audio') return;
  const card=document.createElement('div');
  card.className='msg-card';

async function pollMessages(){
  const msgs=await api('posts?event_id=eq.'+eventId+'&type=eq.message&approved=eq.true&order=created_at.asc');
  if(!Array.isArray(msgs)) return;
  const shown=getShownMsgIds();
  const newMsgs=msgs.filter(m=>m.id&&!shown.has(m.id)&&!msgBubbleQueue.find(q=>q.id===m.id));
  if(newMsgs.length){
    newMsgs.forEach(m=>addMsgToStrip(m));
    msgBubbleQueue.push(...newMsgs);
    if(!msgBubbleShowing) showNextBubble();
  }
}

function showNextBubble(){
  if(!msgBubbleQueue.length){msgBubbleShowing=false;return;}
  msgBubbleShowing=true;
  const msg=msgBubbleQueue.shift();
  markMsgShown(msg.id);
  // Parse custom styling from frame field
  let custom={};
  try{if(msg.frame) custom=JSON.parse(msg.frame);}catch(e){}
  const icon=custom.emoji||(cfg.bubbleIcon==='none'?'':cfg.bubbleIcon==='fixed'?'💬':MSG_ICONS[Math.floor(Math.random()*MSG_ICONS.length)]);
  const iconEl=document.getElementById('msg-bubble-icon');
  iconEl.textContent=icon;
  iconEl.style.display=icon?'block':'none';
  const textEl=document.getElementById('msg-bubble-text');
  textEl.textContent=msg.content;
  const fontSize=custom.fontSize||cfg.fsBubble||32;
  // Scale font based on text length for better fit
  const textLen=msg.content.length;
  const dynMax=textLen<=10?fontSize:textLen<=30?Math.round(fontSize*0.85):textLen<=60?Math.round(fontSize*0.7):Math.round(fontSize*0.6);
  textEl.style.fontSize='clamp(16px,3.5vw,'+dynMax+'px)';
  textEl.style.wordBreak='break-word';
  textEl.style.overflowWrap='break-word';
  textEl.style.maxWidth='100%';
  document.getElementById('msg-bubble-author').textContent='— '+msg.author;
  // Apply custom style
  const card=document.getElementById('msg-bubble-card');
  const tail=document.getElementById('bubble-tail');
  const bgColor=custom.bgColor||'var(--bubble-bg)';
  const txtColor=custom.textColor||'var(--bubble-txt)';
  const bubbleStyle=custom.bubbleStyle||'bubble';
  // Apply background
  const styleMap={
    bubble:{borderRadius:'var(--bubble-radius)',background:bgColor,boxShadow:'0 32px 80px rgba(0,0,0,0.5)',border:'none',padding:'36px 44px'},
    card:{borderRadius:'12px',background:bgColor,boxShadow:'0 8px 32px rgba(0,0,0,0.3)',border:'4px solid '+bgColor,padding:'32px 40px'},
    banner:{borderRadius:'6px',background:bgColor,boxShadow:'0 4px 24px rgba(0,0,0,0.4)',border:'none',padding:'28px 60px',maxWidth:'90vw'},
    minimal:{borderRadius:'0',background:'transparent',boxShadow:'none',border:'none',borderBottom:'4px solid '+bgColor,padding:'24px 40px'},
  };
  const st=styleMap[bubbleStyle]||styleMap.bubble;
  Object.assign(card.style,st);
  if(tail) tail.style.display=(bubbleStyle==='bubble')?'block':'none';
  if(tail) tail.style.borderTopColor=bgColor;
  textEl.style.color=bubbleStyle==='minimal'?bgColor:txtColor;
  document.getElementById('msg-bubble-author').style.color=bubbleStyle==='minimal'?bgColor:txtColor;
  document.getElementById('msg-bubble-author').style.opacity='0.6';
  const overlay=document.getElementById('msg-bubble-overlay');
  card.style.animation='none';void card.offsetWidth;
  card.style.animation='bubbleIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275) forwards';
  overlay.style.display='flex';
  const readTime=Math.max(4000,3000+msg.content.length*60);
  setTimeout(()=>{
    card.style.animation='bubbleOut 0.4s ease forwards';
    setTimeout(()=>{overlay.style.display='none';setTimeout(showNextBubble,800);},400);
  },readTime);
}

let pollScreenVisible=false;
let pollTimerInterval=null;
let currentPollData=null;

async function pollForPolls(){
  const polls=await api('polls?event_id=eq.'+eventId+'&active=eq.true&order=created_at.desc&limit=1');
  if(!Array.isArray(polls)||!polls.length){
    if(pollScreenVisible){
      document.getElementById('poll-overlay').style.display='none';
      pollScreenVisible=false;
      clearInterval(pollTimerInterval);
      const rbar=document.getElementById('reaction-bar');
      if(rbar) rbar.style.display='flex';
    }
    return;
  }
  const poll=polls[0];
  // Auto-close if time is up
  if(poll.ends_at&&new Date(poll.ends_at)<=new Date()){
    await api('polls?id=eq.'+poll.id,{method:'PATCH',body:'{"active":false}'});
    if(pollScreenVisible){
      document.getElementById('poll-overlay').style.display='none';
      pollScreenVisible=false;clearInterval(pollTimerInterval);
    }
    return;
  }
  const votes=await api('poll_votes?poll_id=eq.'+poll.id+'&select=option_idx');
  currentPollData=poll;
  renderPollScreen(poll,Array.isArray(votes)?votes:[]);
}

function renderPollScreen(poll,votes){
  const opts=Array.isArray(poll.options)?poll.options:[];
  const total=votes.length;
  const counts=opts.map((_,i)=>votes.filter(v=>v.option_idx===i).length);
  const maxVotes=Math.max(...counts,1);
  document.getElementById('poll-screen-question').textContent=poll.question;
  document.getElementById('poll-screen-total').textContent=total+' voto'+(total!==1?'s':'')+' en tiempo real';
  const barsDiv=document.getElementById('poll-screen-bars');barsDiv.innerHTML='';
  opts.forEach((opt,i)=>{
    const pct=total>0?Math.round((counts[i]/total)*100):0;
    const isWinner=counts[i]===maxVotes&&total>0;
    const bar=document.createElement('div');bar.className='sbar-wrap';
    bar.innerHTML='<div class="sbar-top"><span class="sbar-label">'+opt+'</span><span class="sbar-count">'+counts[i]+' · '+pct+'%</span></div><div class="sbar-bg"><div class="sbar-fill'+(isWinner?' winner':'')+'" style="width:'+pct+'%"></div></div>';
    barsDiv.appendChild(bar);
  });
  document.getElementById('poll-overlay').style.display='flex';
  pollScreenVisible=true;
  startPollTimer(poll);
  // Hide reactions while poll is active
  const rbar=document.getElementById('reaction-bar');
  if(rbar) rbar.style.display='none';
}

function startPollTimer(poll){
  clearInterval(pollTimerInterval);
  const timerEl=document.getElementById('poll-screen-timer');
  if(!timerEl) return;
  // No ends_at = no timer
  if(!poll.ends_at){
    timerEl.style.display='none';
    return;
  }
  timerEl.style.display='block';
  function updateTimer(){
    const remaining=Math.max(0,Math.round((new Date(poll.ends_at)-Date.now())/1000));
    const m=Math.floor(remaining/60);
    const s=remaining%60;
    timerEl.textContent=m>0?m+':'+String(s).padStart(2,'0'):s+'s';
    if(remaining<=10){timerEl.style.color='#ef4444';timerEl.style.animation='recPulse 0.5s infinite';}
    else if(remaining<=30){timerEl.style.color='var(--gold)';timerEl.style.animation='none';}
    else{timerEl.style.color='var(--accent)';timerEl.style.animation='none';}
    if(remaining<=0){
      clearInterval(pollTimerInterval);
      timerEl.textContent='⏰';
      timerEl.style.color='#ef4444';
    }
  }
  updateTimer();
  pollTimerInterval=setInterval(updateTimer,1000);
}

async function loadPosts(){
  posts=await api('posts?event_id=eq.'+eventId+'&approved=eq.true&order=created_at.desc');
  if(!Array.isArray(posts)) posts=[];
  lastPostCount=posts.length;
  updateCounters();
  photoPosts=posts.filter(p=>p.type==='photo'&&p.content&&p.content.startsWith('http'));
  // Keep only the last N photos in carousel
  if(photoPosts.length>cfg.carouselLimit) photoPosts=photoPosts.slice(0,cfg.carouselLimit);
  buildStrip();
  if(photoPosts.length) showFeatured(photoPosts[0],0);
  // Mark ALL existing messages+wishes+audios as already shown
  // so they don't replay after reload
  posts.forEach(p=>{
    if(p.type==='message'||p.type==='wish') markMsgShown(p.id);
    if(p.type==='audio') markAudioPlayed(p.id);
    if(p.type==='wish') markWishShown(p.id);
  });
  // Load last 5 messages+audios into sidebar strip (display only, not bubble queue)
  const sidebarPosts=posts.filter(p=>p.type==='message'||p.type==='audio').slice(0,5).reverse();
  sidebarPosts.forEach(m=>addMsgToStrip(m));
}

async function pollPosts(){
  const fresh=await api('posts?event_id=eq.'+eventId+'&approved=eq.true&order=created_at.desc');
  if(!Array.isArray(fresh)) return;

  const freshIds=new Set(fresh.map(p=>p.id));
  const knownIds=new Set(posts.map(p=>p.id));

  // Handle deleted posts
  const removedIds=posts.filter(p=>!freshIds.has(p.id)).map(p=>p.id);
  if(removedIds.length){
    removedIds.forEach(id=>{
      photoPosts=photoPosts.filter(p=>p.id!==id);
      msgBubbleQueue=msgBubbleQueue.filter(m=>m.id!==id);
      if(currentFeaturedPostId===id) currentFeaturedPostId=null;
    });
    // Rebuild photoPosts from fresh data to fill the gap
    const freshPhotos=fresh.filter(p=>p.type==='photo'&&p.content&&p.content.startsWith('http'));
    const limit=cfg.carouselLimit||5;
    photoPosts=freshPhotos.slice(0,limit);
    buildStrip();
    // If featured was deleted or no current, show first available
    if(!currentFeaturedPostId){
      if(photoPosts.length) showFeatured(photoPosts[0],0);
      else{
        document.getElementById('featured-img').style.display='none';
        document.getElementById('featured-overlay').style.display='none';
        document.getElementById('no-content').style.display='flex';
      }
    }
  }

  // Handle new posts — compare by ID not by count
  const newItems=fresh.filter(f=>!knownIds.has(f.id));
  if(newItems.length){
    newItems.forEach(p=>{
      if(p.type==='photo'&&p.content&&p.content.startsWith('http')){
        // Add to front but don't interrupt current photo
        photoPosts.unshift(p);
        if(photoPosts.length>cfg.carouselLimit) photoPosts=photoPosts.slice(0,cfg.carouselLimit);
        buildStrip();
        // Only switch if no photo is currently showing
        if(!currentFeaturedPostId){
          featuredIdx=0;
          showFeatured(photoPosts[0],0);
        }
        // Otherwise let the rotation timer show it naturally on next cycle
      }
      if(p.type==='audio'&&p.content&&!getPlayedAudioIds().has(p.id)){
        markAudioPlayed(p.id);
        addMsgToStrip(p);
        setTimeout(async()=>{
        try{
          const ctx=getAudioCtx();
          await ctx.resume();
          // Fetch and decode via AudioContext (bypasses autoplay block better than <audio>)
          const res=await fetch(p.content);
          const arrBuf=await res.arrayBuffer();
          const audioBuf=await ctx.decodeAudioData(arrBuf);
          const src=ctx.createBufferSource();
          src.buffer=audioBuf;
          src.connect(ctx.destination);
          src.start(0);
        }catch(e){
          // Fallback to <audio> element
          try{const a=new Audio(p.content);await a.play();}catch(e2){}
        }
      },800);
      }
    });
    playSound(cfg.sound);showNewBadge();
  }

  // Always sync state
  posts=fresh;lastPostCount=fresh.length;updateCounters();
}

// ── BACKGROUND CANVAS EFFECTS ────────────────────────────────
let bgAnimFrame=null;
let bgParticles=[];
let currentEffect='none';

function startBgEffect(effect){
  cancelAnimationFrame(bgAnimFrame);
  bgParticles=[];
  currentEffect=effect;
  const canvas=document.getElementById('bg-canvas');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(effect==='none'||!effect){canvas.style.opacity='0';return;}
  canvas.style.opacity='0.7';
  if(effect==='confetti') initConfetti(canvas,ctx);
  else if(effect==='petals') initPetals(canvas,ctx);
  else if(effect==='neon') initNeon(canvas,ctx);
  else if(effect==='gold') initGold(canvas,ctx);
  else if(effect==='stars') initStars(canvas,ctx);
  else if(effect==='bubbles') initBubbles(canvas,ctx);
}

window.addEventListener('resize',()=>{
  const canvas=document.getElementById('bg-canvas');
  if(canvas){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
  if(currentEffect!=='none') startBgEffect(currentEffect);
});

// ── CONFETTI (Fiesta) ─────────────────────────────────────────
function initConfetti(canvas,ctx){
  const colors=['#f0176f','#ffd700','#00f5ff','#ff6b9d','#a855f7','#22d3ee','#fb923c'];
  for(let i=0;i<80;i++){
    bgParticles.push({
      x:Math.random()*canvas.width, y:Math.random()*canvas.height-canvas.height,
      w:6+Math.random()*8, h:3+Math.random()*5,
      color:colors[Math.floor(Math.random()*colors.length)],
      rot:Math.random()*360, rotSpeed:(Math.random()-0.5)*4,
      vx:(Math.random()-0.5)*1.5, vy:1+Math.random()*2,
      opacity:0.7+Math.random()*0.3
    });
  }
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    bgParticles.forEach(p=>{
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.globalAlpha=p.opacity;ctx.fillStyle=p.color;
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
      p.y+=p.vy;p.x+=p.vx;p.rot+=p.rotSpeed;
      if(p.y>canvas.height+20){p.y=-20;p.x=Math.random()*canvas.width;}
    });
    bgAnimFrame=requestAnimationFrame(draw);
  }
  draw();
}

// ── PETALS (Romántico) ────────────────────────────────────────
function initPetals(canvas,ctx){
  const petalColors=['#ffb7c5','#ff9eb5','#ffd6e0','#ffadc5','#ff85a1'];
  for(let i=0;i<50;i++){
    bgParticles.push({
      x:Math.random()*canvas.width, y:Math.random()*canvas.height,
      size:8+Math.random()*16, color:petalColors[Math.floor(Math.random()*petalColors.length)],
      rot:Math.random()*360, rotSpeed:(Math.random()-0.5)*1.5,
      vx:(Math.random()-0.5)*0.8, vy:0.5+Math.random()*1,
      swing:Math.random()*0.03, swingOffset:Math.random()*Math.PI*2,
      t:0, opacity:0.4+Math.random()*0.4
    });
  }
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    bgParticles.forEach(p=>{
      p.t+=0.02;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.globalAlpha=p.opacity;ctx.fillStyle=p.color;
      // Draw petal shape
      ctx.beginPath();
      ctx.ellipse(0,0,p.size/2,p.size,Math.sin(p.t)*0.5,0,Math.PI*2);
      ctx.fill();ctx.restore();
      p.y+=p.vy;
      p.x+=p.vx+Math.sin(p.t+p.swingOffset)*0.5;
      p.rot+=p.rotSpeed;
      if(p.y>canvas.height+30){p.y=-30;p.x=Math.random()*canvas.width;}
    });
    bgAnimFrame=requestAnimationFrame(draw);
  }
  draw();
}

// ── NEON GRID (Futurista) ─────────────────────────────────────
function initNeon(canvas,ctx){
  const lines=[];
  const gridSize=60;
  // Horizontal + vertical grid lines
  for(let x=0;x<canvas.width+gridSize;x+=gridSize)
    lines.push({type:'v',pos:x,speed:0,phase:Math.random()*Math.PI*2});
  for(let y=0;y<canvas.height+gridSize;y+=gridSize)
    lines.push({type:'h',pos:y,speed:0,phase:Math.random()*Math.PI*2});
  // Particles
  const accent='#00f5ff';
  for(let i=0;i<30;i++){
    bgParticles.push({
      x:Math.random()*canvas.width, y:Math.random()*canvas.height,
      r:1+Math.random()*3, vx:(Math.random()-0.5)*1.5, vy:(Math.random()-0.5)*1.5,
      opacity:0.6+Math.random()*0.4, pulseT:Math.random()*Math.PI*2
    });
  }
  let t=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    t+=0.01;
    // Grid
    ctx.strokeStyle=accent;
    ctx.lineWidth=0.5;
    lines.forEach(l=>{
      const pulse=0.08+0.06*Math.sin(t*2+l.phase);
      ctx.globalAlpha=pulse;
      ctx.beginPath();
      if(l.type==='v'){ctx.moveTo(l.pos,0);ctx.lineTo(l.pos,canvas.height);}
      else{ctx.moveTo(0,l.pos);ctx.lineTo(canvas.width,l.pos);}
      ctx.stroke();
    });
    // Particles
    bgParticles.forEach(p=>{
      p.pulseT+=0.05;
      const alpha=(0.4+0.4*Math.sin(p.pulseT))*p.opacity;
      ctx.globalAlpha=alpha;
      ctx.fillStyle=accent;
      ctx.shadowColor=accent;ctx.shadowBlur=8;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0||p.x>canvas.width) p.vx*=-1;
      if(p.y<0||p.y>canvas.height) p.vy*=-1;
    });
    ctx.globalAlpha=1;
    bgAnimFrame=requestAnimationFrame(draw);
  }
  draw();
}

// ── GOLD DUST (Elegante) ──────────────────────────────────────
function initGold(canvas,ctx){
  for(let i=0;i<120;i++){
    bgParticles.push({
      x:Math.random()*canvas.width, y:Math.random()*canvas.height,
      r:0.5+Math.random()*2.5,
      vx:(Math.random()-0.5)*0.4, vy:-0.2-Math.random()*0.6,
      opacity:0,maxOpacity:0.3+Math.random()*0.6,
      fade:Math.random()<0.5?1:-1, pulseT:Math.random()*Math.PI*2
    });
  }
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    bgParticles.forEach(p=>{
      p.pulseT+=0.02;
      p.opacity+=p.fade*0.008;
      if(p.opacity>=p.maxOpacity) p.fade=-1;
      if(p.opacity<=0){p.fade=1;p.x=Math.random()*canvas.width;p.y=canvas.height+10;}
      const grad=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*3);
      grad.addColorStop(0,'rgba(245,166,35,'+p.opacity+')');
      grad.addColorStop(0.5,'rgba(255,215,0,'+p.opacity*0.5+')');
      grad.addColorStop(1,'rgba(255,215,0,0)');
      ctx.fillStyle=grad;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*3,0,Math.PI*2);ctx.fill();
      p.x+=p.vx;p.y+=p.vy;
      if(p.y<-10) p.y=canvas.height+10;
    });
    bgAnimFrame=requestAnimationFrame(draw);
  }
  draw();
}

// ── STARS (bonus) ─────────────────────────────────────────────
function initStars(canvas,ctx){
  for(let i=0;i<150;i++){
    bgParticles.push({
      x:Math.random()*canvas.width, y:Math.random()*canvas.height,
      r:0.5+Math.random()*2, pulseT:Math.random()*Math.PI*2,
      speed:0.01+Math.random()*0.03, opacity:0.2+Math.random()*0.8,
      color:Math.random()<0.8?'#ffffff':'#f0176f'
    });
  }
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    bgParticles.forEach(p=>{
      p.pulseT+=p.speed;
      const a=p.opacity*(0.5+0.5*Math.sin(p.pulseT));
      ctx.globalAlpha=a;ctx.fillStyle=p.color;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    });
    ctx.globalAlpha=1;
    bgAnimFrame=requestAnimationFrame(draw);
  }
  draw();
}

// ── BUBBLES (bonus) ───────────────────────────────────────────
function initBubbles(canvas,ctx){
  for(let i=0;i<40;i++){
    bgParticles.push({
      x:Math.random()*canvas.width, y:canvas.height+Math.random()*canvas.height,
      r:10+Math.random()*40, vy:0.3+Math.random()*0.8,
      vx:(Math.random()-0.5)*0.5, opacity:0.05+Math.random()*0.1
    });
  }
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    bgParticles.forEach(p=>{
      ctx.globalAlpha=p.opacity;
      ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.stroke();
      // Shine
      ctx.globalAlpha=p.opacity*0.5;
      ctx.fillStyle='rgba(255,255,255,0.3)';
      ctx.beginPath();ctx.arc(p.x-p.r*0.3,p.y-p.r*0.3,p.r*0.2,0,Math.PI*2);ctx.fill();
      p.y-=p.vy;p.x+=p.vx;
      if(p.y<-p.r*2) p.y=canvas.height+p.r;
    });
    ctx.globalAlpha=1;
    bgAnimFrame=requestAnimationFrame(draw);
  }
  draw();
}


// ── MOSAIC MODE ───────────────────────────────────────────────
let mosaicActive=false;
let mosaicStyle='grid'; // grid | dynamic | masonry
let mosaicPhotos=[];
let mosaicPollInterval=null;
const MOSAIC_MAX=50;

function setMosaicStyle(style){
  mosaicStyle=style;
  renderMosaic();
}

async function startMosaic(){
  mosaicActive=true;
  document.getElementById('mosaic-overlay').style.display='flex';
  document.getElementById('mosaic-ev-name').textContent=eventName||'';
  // Load photos
  const posts=await api('posts?event_id=eq.'+eventId+'&type=eq.photo&approved=eq.true&order=created_at.desc&limit='+MOSAIC_MAX);
  mosaicPhotos=Array.isArray(posts)?posts.filter(p=>p.content&&p.content.startsWith('http')):[];
  renderMosaic();
  // Poll for new photos
  mosaicPollInterval=setInterval(async()=>{
    const fresh=await api('posts?event_id=eq.'+eventId+'&type=eq.photo&approved=eq.true&order=created_at.desc&limit='+MOSAIC_MAX);
    if(!Array.isArray(fresh)) return;
    const freshPhotos=fresh.filter(p=>p.content&&p.content.startsWith('http'));
    const knownIds=new Set(mosaicPhotos.map(p=>p.id));
    const newPhotos=freshPhotos.filter(p=>!knownIds.has(p.id));
    if(newPhotos.length){
      mosaicPhotos=[...newPhotos,...mosaicPhotos].slice(0,MOSAIC_MAX);
      renderMosaic(newPhotos.map(p=>p.id));
    }
    // Handle deletions
    const freshIds=new Set(freshPhotos.map(p=>p.id));
    const removed=mosaicPhotos.filter(p=>!freshIds.has(p.id));
    if(removed.length){
      mosaicPhotos=mosaicPhotos.filter(p=>freshIds.has(p.id));
      renderMosaic();
    }
  },4000);
}

function stopMosaic(){
  mosaicActive=false;
  clearInterval(mosaicPollInterval);
  document.getElementById('mosaic-overlay').style.display='none';
}

function renderMosaic(newIds=[]){
  const grid=document.getElementById('mosaic-grid');
  const W=grid.offsetWidth||window.innerWidth;
  const H=grid.offsetHeight||(window.innerHeight-52);
  const count=mosaicPhotos.length;
  document.getElementById('mosaic-count').textContent=count+' foto'+(count!==1?'s':'');

  if(mosaicStyle==='grid') renderGrid(grid,W,H,newIds);
  else if(mosaicStyle==='dynamic') renderDynamic(grid,W,H,newIds);
  else if(mosaicStyle==='masonry') renderMasonry(grid,W,H,newIds);
}

function renderGrid(grid,W,H,newIds){
  const count=mosaicPhotos.length;
  if(!count){grid.innerHTML='<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.2);font-size:24px">Esperando fotos...</div>';return;}
  const cols=Math.ceil(Math.sqrt(count*(W/H)));
  const rows=Math.ceil(count/cols);
  const cw=Math.floor(W/cols)-4;
  const ch=Math.floor(H/rows)-4;

  // Remove deleted cells
  const existingIds=new Set(mosaicPhotos.map(p=>p.id));
  grid.querySelectorAll('.mosaic-cell').forEach(el=>{
    if(!existingIds.has(el.dataset.id)) el.remove();
  });

  mosaicPhotos.forEach((p,i)=>{
    const col=i%cols, row=Math.floor(i/cols);
    const x=col*(cw+4)+4, y=row*(ch+4)+4;
    let cell=grid.querySelector('[data-id="'+p.id+'"]');
    const isNew=newIds.includes(p.id);
    if(!cell){
      cell=document.createElement('div');
      cell.className='mosaic-cell'+(isNew?' new-cell':'');
      cell.dataset.id=p.id;
      cell.innerHTML='<img src="'+p.content+'" loading="lazy"/><div class="mcell-author">'+p.author+'</div>';
      grid.appendChild(cell);
    }
    cell.style.left=x+'px';cell.style.top=y+'px';
    cell.style.width=cw+'px';cell.style.height=ch+'px';
    if(isNew) setTimeout(()=>cell.classList.remove('new-cell'),600);
  });
}

function renderDynamic(grid,W,H,newIds){
  const count=mosaicPhotos.length;
  if(!count){grid.innerHTML='<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.2);font-size:24px">Esperando fotos...</div>';return;}

  // First photo is featured (2x2), rest are small
  const featuredId=mosaicPhotos[0]?.id;
  const cols=4;
  const smallW=Math.floor(W/cols)-4;
  const smallH=Math.floor(H/3)-4;
  const featW=smallW*2+4, featH=smallH*2+4;

  const existingIds=new Set(mosaicPhotos.map(p=>p.id));
  grid.querySelectorAll('.mosaic-cell').forEach(el=>{if(!existingIds.has(el.dataset.id)) el.remove();});

  // Layout: featured top-left (2x2), rest fill around
  let positions=[];
  positions.push({x:4,y:4,w:featW,h:featH,featured:true}); // featured
  // Small cells: right of featured (cols 2,3) rows 0,1
  for(let c2=2;c2<cols;c2++) for(let r=0;r<2;r++) positions.push({x:c2*(smallW+4)+4,y:r*(smallH+4)+4,w:smallW,h:smallH});
  // Bottom row: all cols
  for(let c2=0;c2<cols;c2++) positions.push({x:c2*(smallW+4)+4,y:2*(smallH+4)+4,w:smallW,h:smallH});

  mosaicPhotos.slice(0,positions.length).forEach((p,i)=>{
    const pos=positions[i];
    let cell=grid.querySelector('[data-id="'+p.id+'"]');
    const isNew=newIds.includes(p.id);
    if(!cell){
      cell=document.createElement('div');
      cell.className='mosaic-cell'+(isNew?' new-cell':'')+(pos.featured?' featured':'');
      cell.dataset.id=p.id;
      cell.innerHTML='<img src="'+p.content+'" loading="lazy"/><div class="mcell-author">'+p.author+'</div>';
      grid.appendChild(cell);
    }
    cell.classList.toggle('featured',!!pos.featured);
    cell.style.left=pos.x+'px';cell.style.top=pos.y+'px';
    cell.style.width=pos.w+'px';cell.style.height=pos.h+'px';
    if(isNew) setTimeout(()=>cell.classList.remove('new-cell'),600);
  });
}

function renderMasonry(grid,W,H,newIds){
  const count=mosaicPhotos.length;
  if(!count){grid.innerHTML='<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.2);font-size:24px">Esperando fotos...</div>';return;}

  const cols=Math.min(5,Math.max(3,Math.ceil(count/3)));
  const colW=Math.floor(W/cols)-4;
  const colHeights=new Array(cols).fill(4);
  const existingIds=new Set(mosaicPhotos.map(p=>p.id));
  grid.querySelectorAll('.mosaic-cell').forEach(el=>{if(!existingIds.has(el.dataset.id)) el.remove();});

  mosaicPhotos.forEach(p=>{
    // Pick shortest column
    const col=colHeights.indexOf(Math.min(...colHeights));
    // Random-ish height based on id hash
    const hash=p.id.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
    const cellH=Math.floor(colW*(0.6+((hash%40)/100)));
    const x=col*(colW+4)+4;
    const y=colHeights[col];
    let cell=grid.querySelector('[data-id="'+p.id+'"]');
    const isNew=newIds.includes(p.id);
    if(!cell){
      cell=document.createElement('div');
      cell.className='mosaic-cell'+(isNew?' new-cell':'');
      cell.dataset.id=p.id;
      cell.innerHTML='<img src="'+p.content+'" loading="lazy"/><div class="mcell-author">'+p.author+'</div>';
      grid.appendChild(cell);
    }
    cell.style.left=x+'px';cell.style.top=y+'px';
    cell.style.width=colW+'px';cell.style.height=cellH+'px';
    colHeights[col]+=cellH+4;
    if(isNew) setTimeout(()=>cell.classList.remove('new-cell'),600);
  });
}

window.addEventListener('resize',()=>{if(mosaicActive) renderMosaic();});


// ── MOMENTS ENGINE ────────────────────────────────────────────
let lastMomentId=null;
let momentAnimFrame=null;

async function pollMoments(){
  try{
    const moments=await api('moments?event_id=eq.'+eventId+'&order=launched_at.desc&limit=1');
    if(!Array.isArray(moments)||!moments.length) return;
    const m=moments[0];
    if(m.id===lastMomentId) return;
    // Check if launched within last 60s
    const age=(Date.now()-new Date(m.launched_at).getTime())/1000;
    if(age>60){lastMomentId=m.id;return;}
    lastMomentId=m.id;
    let effect={type:'confetti',duration:10,subtext:''};
    try{effect=JSON.parse(m.effect||'{}');}catch(e){}
    showMoment(m.text,effect);
  }catch(e){}
}

function showMoment(text, effect){
  const overlay=document.getElementById('moment-overlay');
  const mainText=document.getElementById('moment-main-text');
  const subText=document.getElementById('moment-sub-text');
  const canvas=document.getElementById('moment-canvas');
  const flash=document.getElementById('moment-flash');
  const duration=(effect.duration||10)*1000;

  // Setup canvas
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  overlay.style.display='flex';

  // Blur background in
  const blurBg=document.getElementById('moment-blur-bg');
  if(blurBg) setTimeout(()=>blurBg.style.opacity='1',50);

  // Text animation
  mainText.textContent=text;
  subText.textContent=effect.subtext||'';
  setTimeout(()=>{
    mainText.style.opacity='1';mainText.style.transform='scale(1)';
    subText.style.opacity='1';subText.style.transform='translateY(0)';
  },200);

  // Flash effect
  if(effect.type==='flash'||effect.type==='all'){
    flash.style.opacity='0.9';
    setTimeout(()=>flash.style.opacity='0',150);
    setTimeout(()=>{flash.style.opacity='0.5';setTimeout(()=>flash.style.opacity='0',100);},300);
  }

  // Particle effects
  const ctx=canvas.getContext('2d');
  const particles=[];
  const type=effect.type;

  if(type==='confetti'||type==='all'){
    const cols=['#f0176f','#ffd700','#00f5ff','#ff6b9d','#a855f7','#22d3ee','#fb923c','#4ade80'];
    for(let i=0;i<200;i++){
      particles.push({
        x:Math.random()*canvas.width, y:-20-Math.random()*canvas.height*0.5,
        w:8+Math.random()*10, h:4+Math.random()*6,
        color:cols[Math.floor(Math.random()*cols.length)],
        rot:Math.random()*360, rotS:(Math.random()-0.5)*3,
        vx:(Math.random()-0.5)*2, vy:0.5+Math.random()*1.5,
        o:1, type:'confetti'
      });
    }
  }

  if(type==='petals'||type==='all'){
    const cols=['#ffb7c5','#ff9eb5','#ffd6e0','#ff85a1','#ffadc5'];
    for(let i=0;i<120;i++){
      particles.push({
        x:Math.random()*canvas.width, y:-30-Math.random()*200,
        s:10+Math.random()*20,
        color:cols[Math.floor(Math.random()*cols.length)],
        rot:Math.random()*360, rotS:(Math.random()-0.5)*3,
        vx:(Math.random()-0.5)*2, vy:1+Math.random()*2.5,
        t:Math.random()*Math.PI*2, o:0.8, type:'petal'
      });
    }
  }

  if(type==='fireworks'||type==='all'){
    // Launch fireworks periodically
    const fw=setInterval(()=>{
      const x=canvas.width*0.2+Math.random()*canvas.width*0.6;
      const y=canvas.height*0.1+Math.random()*canvas.height*0.5;
      const cols=['#f0176f','#ffd700','#00f5ff','#ff6b9d','#a855f7','#ffffff','#4ade80'];
      const col=cols[Math.floor(Math.random()*cols.length)];
      for(let i=0;i<60;i++){
        const angle=(i/60)*Math.PI*2;
        const speed=3+Math.random()*6;
        particles.push({
          x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed-2,
          color:col,r:2+Math.random()*3,o:1,decay:0.015+Math.random()*0.01,type:'spark'
        });
      }
    },400);
    setTimeout(()=>clearInterval(fw),duration-500);
  }

  // Animation loop
  let startTime=Date.now();
  cancelAnimationFrame(momentAnimFrame);
  function drawMoment(){
    const elapsed=Date.now()-startTime;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];
      if(p.type==='confetti'){
        ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
        ctx.globalAlpha=p.o;ctx.fillStyle=p.color;
        ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
        p.y+=p.vy;p.x+=p.vx+Math.sin(p.rot*0.05)*0.5;p.rot+=p.rotS;p.vy+=0.02;
        if(p.y>canvas.height+20) particles.splice(i,1);
      } else if(p.type==='petal'){
        p.t+=0.03;
        ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
        ctx.globalAlpha=p.o;ctx.fillStyle=p.color;
        ctx.beginPath();ctx.ellipse(0,0,p.s/2,p.s,Math.sin(p.t)*0.5,0,Math.PI*2);
        ctx.fill();ctx.restore();
        p.y+=p.vy;p.x+=p.vx+Math.sin(p.t)*0.8;p.rot+=p.rotS;
        if(p.y>canvas.height+30) particles.splice(i,1);
      } else if(p.type==='spark'){
        ctx.globalAlpha=p.o;ctx.fillStyle=p.color;
        ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
        p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.o-=p.decay;p.r*=0.97;
        if(p.o<=0) particles.splice(i,1);
      }
    }
    if(elapsed<duration) momentAnimFrame=requestAnimationFrame(drawMoment);
    else hideMoment();
  }
  drawMoment();

  // Auto-hide
  setTimeout(hideMoment, duration);
}

function hideMoment(){
  cancelAnimationFrame(momentAnimFrame);
  const overlay=document.getElementById('moment-overlay');
  const mainText=document.getElementById('moment-main-text');
  const subText=document.getElementById('moment-sub-text');
  const blurBg2=document.getElementById('moment-blur-bg');
  mainText.style.opacity='0';mainText.style.transform='scale(1.2)';
  subText.style.opacity='0';
  if(blurBg2) blurBg2.style.opacity='0';
  setTimeout(()=>{
    overlay.style.display='none';
    const ctx=document.getElementById('moment-canvas').getContext('2d');
    ctx.clearRect(0,0,document.getElementById('moment-canvas').width,document.getElementById('moment-canvas').height);
  },500);
}

init();
</script>
</body>
